{% set name = "abi3audit" %}
{% set version = "0.0.26" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/abi3audit-{{ version }}.tar.gz
  sha256: 44b5fa5ddc8acdfdbd221f400d48b8a205df519e8f4c6d57a349837ac88d0ff8

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0
  entry_points:
    - abi3audit = abi3audit._cli:main

requirements:
  host:
    - flit-core >=3.11,<4
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}
    - abi3info >=2024.06.19
    - kaitaistruct >=0.10,<1.dev0
    - packaging >=21.3
    - pefile >=2022.5.30
    - pyelftools >=0.29
    - requests >=2.32.5
    - requests-cache >=0.9.6
    - rich >=12.5.1

test:
  imports:
    - abi3audit
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/abi3audit/
  summary: Scans Python wheels for abi3 violations and inconsistencies
  dev_url: https://github.com/trailofbits/abi3audit
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - wshanks
    - BastianZim
